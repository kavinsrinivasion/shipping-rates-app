<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Custom Shipping Rates Manager</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:#fff;
padding:30px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,.15);
}

h2{
text-align:center;
margin-bottom:25px;
color:#222;
}

label{
font-weight:bold;
display:block;
margin-top:10px;
}

input{
width:100%;
padding:12px;
margin-top:5px;
border:1px solid #ccc;
border-radius:6px;
font-size:15px;
}

button{
margin-top:20px;
width:100%;
padding:12px;
background:#0d6efd;
color:#fff;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0b5ed7;
}

table{
width:100%;
margin-top:25px;
border-collapse:collapse;
}

th{
background:#0d6efd;
color:white;
padding:12px;
}

td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

.deleteBtn{
background:#dc3545;
padding:8px 15px;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

.deleteBtn:hover{
background:#bb2d3b;
}

/* Popup */

.popup{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
z-index:999;
}

.popup-box{
background:white;
width:380px;
padding:25px;
border-radius:10px;
text-align:center;
animation:popup .3s;
}

@keyframes popup{

from{
transform:scale(.7);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

.popup-box h3{
margin-bottom:15px;
color:red;
}

.popup-box p{
margin-bottom:20px;
}

.popup-box button{
width:120px;
margin:auto;
}

.success h3{
color:green;
}

</style>

</head>

<body>

<div class="container">

<h2>Custom Shipping Rates Manager</h2>

<label>Customer Location</label>

<input
id="location"
type="text"
maxlength="30"
placeholder="Enter Customer Location">

<label>Minimum Weight (kg)</label>

<input
id="minWeight"
type="number"
placeholder="Minimum Weight">

<label>Maximum Weight (kg)</label>

<input
id="maxWeight"
type="number"
placeholder="Maximum Weight">

<label>Distance (km)</label>

<input
id="distance"
type="number"
min="1"
max="1000"
placeholder="1 - 1000 KM">

<label>Shipping Cost (₹)</label>

<input
id="price"
type="number"
placeholder="Shipping Cost">

<button onclick="addRule()">
Add Shipping Rule
</button>

<table>

<thead>

<tr>

<th>Location</th>
<th>Weight</th>
<th>Distance</th>
<th>Cost</th>
<th>Action</th>

</tr>

</thead>

<tbody id="rules">

</tbody>

</table>

</div>

<!-- Error Popup -->

<div
id="errorPopup"
class="popup">

<div class="popup-box">

<h3>Error</h3>

<p id="errorMessage"></p>

<button onclick="closeError()">

OK

</button>

</div>

</div>

<!-- Success Popup -->

<div
id="successPopup"
class="popup">

<div class="popup-box success">

<h3>Success</h3>

<p id="successMessage">

Rule Added Successfully

</p>

<button onclick="closeSuccess()">

OK

</button>

</div>

</div>

<script>
    // ==========================
// Custom Shipping Rates
// ==========================

let rules = JSON.parse(localStorage.getItem("shippingRules")) || [];

displayRules();

// ---------- Popup ----------

function showError(message){

document.getElementById("errorMessage").innerHTML = message;

document.getElementById("errorPopup").style.display = "flex";

}

function closeError(){

document.getElementById("errorPopup").style.display = "none";

}

function showSuccess(message){

document.getElementById("successMessage").innerHTML = message;

document.getElementById("successPopup").style.display = "flex";

}

function closeSuccess(){

document.getElementById("successPopup").style.display = "none";

}

// ---------- Add Rule ----------

function addRule(){

let location =
document.getElementById("location").value.trim();

let minWeight =
document.getElementById("minWeight").value;

let maxWeight =
document.getElementById("maxWeight").value;

let distance =
document.getElementById("distance").value;

let price =
document.getElementById("price").value;


// Empty Validation

if(
location=="" ||
minWeight=="" ||
maxWeight=="" ||
distance=="" ||
price==""
){

showError("Please fill all fields.");

return;

}


// Maximum Weight Validation

if(Number(minWeight)>=Number(maxWeight)){

showError("Maximum Weight must be greater than Minimum Weight.");

return;

}


// Distance Validation

if(
Number(distance)<1 ||
Number(distance)>1000
){

showError("Distance must be between 1 and 1000 KM.");

return;

}


// Shipping Cost Validation

if(Number(price)<=0){

showError("Shipping Cost must be greater than 0.");

return;

}


// Save Rule

let rule={

location:location,

minWeight:minWeight,

maxWeight:maxWeight,

distance:distance,

price:price

};

rules.push(rule);

localStorage.setItem(
"shippingRules",
JSON.stringify(rules)
);

displayRules();

showSuccess("Shipping Rule Added Successfully.");

// Auto Clear OFF
// Values appadiye irukkum

}


// ---------- Display ----------

function displayRules(){

let tbody =
document.getElementById("rules");

tbody.innerHTML="";

rules.forEach(function(rule,index){

tbody.innerHTML+=`

<tr>

<td>${rule.location}</td>

<td>

${rule.minWeight}
-
${rule.maxWeight} KG

</td>

<td>

${rule.distance} KM

</td>

<td>

₹${rule.price}

</td>

<td>

<button

class="deleteBtn"

onclick="deleteRule(${index})">

Delete

</button>

</td>

</tr>

`;

});

}


// ---------- Delete ----------

function deleteRule(index){

let answer=
confirm("Are you sure you want to delete this Shipping Rule?");

if(answer){

rules.splice(index,1);

localStorage.setItem(

"shippingRules",

JSON.stringify(rules)

);

displayRules();

showSuccess("Shipping Rule Deleted Successfully.");

}

}

</script>

</body>

</html>
