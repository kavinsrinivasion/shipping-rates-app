<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Custom Shipping Rates Manager</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,.15);
}

h2{
text-align:center;
margin-bottom:25px;
}

label{
font-weight:bold;
display:block;
margin-top:10px;
}

input{
width:100%;
padding:12px;
margin-top:5px;
border:1px solid #ccc;
border-radius:6px;
}

button{

margin-top:15px;
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
background:#0d6efd;
font-size:15px;

}

button:hover{
opacity:.9;
}

.addBtn{
width:100%;
}

table{

width:100%;
margin-top:25px;
border-collapse:collapse;

}

th{

background:#0d6efd;
color:white;
padding:12px;

}

td{

padding:10px;
border:1px solid #ddd;
text-align:center;

}


.deleteBtn{

background:#dc3545;
padding:8px 15px;

}


/* Popup */

.popup{

display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;

}


.popup-box{

background:white;
width:350px;
padding:25px;
border-radius:10px;
text-align:center;

}


.popup-box h3{

margin-bottom:15px;

}


.popup-box button{

width:100px;
margin:10px;

}


.success h3{

color:green;

}


.cancelBtn{

background:#6c757d;

}


.confirmDeleteBtn{

background:#dc3545;

}

</style>

</head>


<body>


<div class="container">


<h2>
Custom Shipping Rates Manager
</h2>


<label>
Customer Location
</label>

<input id="location"
type="text"
maxlength="30"
placeholder="Enter Location">


<label>
Minimum Weight (kg)
</label>

<input id="minWeight"
type="number"
placeholder="Minimum Weight">


<label>
Maximum Weight (kg)
</label>

<input id="maxWeight"
type="number"
placeholder="Maximum Weight">


<label>
Distance (km)
</label>

<input id="distance"
type="number"
min="1"
max="1000"
placeholder="1 - 1000 KM">


<label>
Shipping Cost (₹)
</label>

<input id="price"
type="number"
placeholder="Shipping Cost">


<button class="addBtn" onclick="addRule()">

Add Shipping Rule

</button>



<table>


<thead>

<tr>

<th>Location</th>
<th>Weight</th>
<th>Distance</th>
<th>Cost</th>
<th>Action</th>

</tr>

</thead>


<tbody id="rules">


</tbody>


</table>


</div>



<!-- Error Popup -->

<div id="errorPopup" class="popup">

<div class="popup-box">

<h3 style="color:red;">
Error
</h3>

<p id="errorMessage"></p>


<button onclick="closeError()">
OK
</button>


</div>

</div>



<!-- Success Popup -->

<div id="successPopup" class="popup">

<div class="popup-box success">


<h3>
Success
</h3>


<p id="successMessage"></p>


<button onclick="closeSuccess()">
OK
</button>


</div>

</div>



<!-- Delete Confirm Popup -->

<div id="deletePopup" class="popup">

<div class="popup-box">


<h3 style="color:red;">
Confirm Delete
</h3>


<p>
Are you sure you want to delete this Shipping Rule?
</p>


<button class="confirmDeleteBtn"
onclick="confirmDelete()">

Delete

</button>


<button class="cancelBtn"
onclick="closeDelete()">

Cancel

</button>


</div>

</div>


<script>// ==========================
// Custom Shipping Rates
// ==========================

let rules = JSON.parse(localStorage.getItem("shippingRules")) || [];

let deleteIndex = null;

displayRules();


// ---------- Error Popup ----------

function showError(message){

document.getElementById("errorMessage").innerHTML = message;

document.getElementById("errorPopup").style.display="flex";

}


function closeError(){

document.getElementById("errorPopup").style.display="none";

}



// ---------- Success Popup ----------

function showSuccess(message){

document.getElementById("successMessage").innerHTML = message;

document.getElementById("successPopup").style.display="flex";


setTimeout(function(){

closeSuccess();

},2000);


}


function closeSuccess(){

document.getElementById("successPopup").style.display="none";

}



// ---------- Add Rule ----------

function addRule(){


let location =
document.getElementById("location").value.trim();


let minWeight =
document.getElementById("minWeight").value;


let maxWeight =
document.getElementById("maxWeight").value;


let distance =
document.getElementById("distance").value;


let price =
document.getElementById("price").value;



// Empty Check

if(
location=="" ||
minWeight=="" ||
maxWeight=="" ||
distance=="" ||
price==""
){

showError("Please fill all fields.");

return;

}



// Weight Check

if(Number(minWeight)>=Number(maxWeight)){

showError(
"Maximum Weight must be greater than Minimum Weight."
);

return;

}



// Distance Check

if(
Number(distance)<1 ||
Number(distance)>1000
){

showError(
"Distance must be between 1 and 1000 KM."
);

return;

}



// Price Check

if(Number(price)<=0){

showError(
"Shipping Cost must be greater than 0."
);

return;

}



// Duplicate Check

let duplicate = rules.some(rule =>

rule.location.toLowerCase()==location.toLowerCase() &&

rule.minWeight==minWeight &&

rule.maxWeight==maxWeight &&

rule.distance==distance &&

rule.price==price

);



if(duplicate){

showError(
"This Shipping Rule already exists."
);

return;

}



// Create Rule

let rule={

location,
minWeight,
maxWeight,
distance,
price

};



rules.push(rule);



localStorage.setItem(
"shippingRules",
JSON.stringify(rules)
);



displayRules();


showSuccess(
"Shipping Rule Added Successfully."
);



}



// ---------- Display Rules ----------

function displayRules(){


let tbody =
document.getElementById("rules");


tbody.innerHTML="";



rules.forEach(function(rule,index){


tbody.innerHTML += `


<tr>

<td>${rule.location}</td>


<td>

${rule.minWeight}
-
${rule.maxWeight} KG

</td>


<td>

${rule.distance} KM

</td>


<td>

₹${rule.price}

</td>


<td>


<button class="deleteBtn"

onclick="deleteRule(${index})">

Delete

</button>


</td>


</tr>


`;


});


}




// ---------- Open Delete Popup ----------


function deleteRule(index){


deleteIndex=index;


document.getElementById("deletePopup").style.display="flex";


}



// ---------- Confirm Delete ----------


function confirmDelete(){


if(deleteIndex !== null){


rules.splice(deleteIndex,1);



localStorage.setItem(

"shippingRules",

JSON.stringify(rules)

);



displayRules();



showSuccess(
"Shipping Rule Deleted Successfully."
);



closeDelete();



deleteIndex=null;


}



}



// ---------- Cancel Delete ----------


function closeDelete(){


document.getElementById("deletePopup").style.display="none";


}
