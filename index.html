<!DOCTYPE html>
<html>
<head>
<title>Custom Shipping Rates</title>

<style>
body{
    font-family: Arial, sans-serif;
    padding:30px;
    background:#f5f5f5;
}

.container{
    background:white;
    padding:25px;
    border-radius:10px;
    max-width:700px;
}

input,button{
    width:100%;
    padding:12px;
    margin:8px 0;
    box-sizing:border-box;
}

button{
    background:#000;
    color:white;
    border:none;
    cursor:pointer;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

.delete{
    background:red;
}
</style>

</head>

<body>

<div class="container">

<h2>Custom Shipping Rates Manager</h2>


<input id="location" placeholder="Customer Location">

<input id="minWeight" type="number" placeholder="Minimum Weight (kg)">

<input id="maxWeight" type="number" placeholder="Maximum Weight (kg)">

<input id="distance" type="number" placeholder="Distance (km)">

<input id="price" type="number" placeholder="Shipping Cost">

<button onclick="addRule()">
Add Shipping Rule
</button>


<h3>Shipping Rules</h3>

<table>

<thead>
<tr>
<th>Location</th>
<th>Weight</th>
<th>Distance</th>
<th>Cost</th>
<th>Action</th>
</tr>
</thead>

<tbody id="rules">

</tbody>

</table>

</div>


<script>

let rules = JSON.parse(localStorage.getItem("shippingRules")) || [];


function addRule(){

let rule={
location:document.getElementById("location").value,
minWeight:document.getElementById("minWeight").value,
maxWeight:document.getElementById("maxWeight").value,
distance:document.getElementById("distance").value,
price:document.getElementById("price").value
};


rules.push(rule);

localStorage.setItem(
"shippingRules",
JSON.stringify(rules)
);


displayRules();

}


function displayRules(){

let table="";


rules.forEach((r,index)=>{

table += `
<tr>

<td>${r.location}</td>

<td>${r.minWeight} - ${r.maxWeight} kg</td>

<td>${r.distance} km</td>

<td>₹${r.price}</td>

<td>
<button class="delete" onclick="deleteRule(${index})">
Delete
</button>
</td>

</tr>
`;

});


document.getElementById("rules").innerHTML=table;

}



function deleteRule(index){

rules.splice(index,1);

localStorage.setItem(
"shippingRules",
JSON.stringify(rules)
);

displayRules();

}


displayRules();


</script>


</body>
</html>
