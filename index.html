<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Custom Shipping Rates Manager</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body{

    background:#f1f5f9;
    padding:30px;

}


.container{

    max-width:1100px;
    margin:auto;

}



/* Header */

.header{

    background:#2563eb;
    color:white;
    padding:25px;
    border-radius:15px;
    margin-bottom:20px;

}


.header h1{

    margin-bottom:8px;

}





/* Card */

.card{

    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    margin-bottom:20px;

}





.counter{

    display:flex;
    justify-content:space-between;
    align-items:center;

}


.counter h2{

    font-size:35px;
    color:#2563eb;

}






/* Form */


label{

    display:block;
    font-weight:bold;
    margin-top:15px;

}



input{

    width:100%;
    padding:12px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;

}




.addBtn{

    width:100%;
    padding:14px;
    margin-top:20px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;

}


.addBtn:hover{

    background:#1d4ed8;

}






/* Table */


.table-card{

    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);

}



table{

    width:100%;
    border-collapse:collapse;
    margin-top:15px;

}



th{

    background:#2563eb;
    color:white;
    padding:12px;

}



td{

    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:center;

}



.deleteBtn{

    background:#dc3545;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:6px;
    cursor:pointer;

}






/* Popup */


.popup{

    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.5);
    justify-content:center;
    align-items:center;

}



.popup-box{

    background:white;
    width:350px;
    padding:25px;
    border-radius:12px;
    text-align:center;

}



.popup-box button{

    padding:10px 20px;
    border:none;
    border-radius:6px;
    color:white;
    cursor:pointer;
    margin:10px;

}



.deleteConfirm{

    background:#dc3545;

}



.cancelBtn{

    background:#6c757d;

}



.okBtn{

    background:#2563eb;

}


</style>


</head>


<body>


<div class="container">


<div class="header">

<h1>
🚚 Custom Shipping Rates Dashboard
</h1>

<p>
Manage Shipping Rules Easily
</p>

</div>





<div class="card counter">


<h3>
Total Shipping Rules
</h3>


<h2 id="totalRules">
0
</h2>


</div>







<div class="card">


<h2>
Add Shipping Rule
</h2>



<label>
Customer Location
</label>


<input

id="location"

type="text"

maxlength="30"

placeholder="Enter Location"

oninput="this.value=this.value.replace(/[^A-Za-z ]/g,'')"

>




<label>
Minimum Weight (KG)
</label>


<input

id="minWeight"

type="number"

placeholder="Minimum Weight"

>




<label>
Maximum Weight (KG)
</label>


<input

id="maxWeight"

type="number"

placeholder="Maximum Weight"

>




<label>
Distance (KM)
</label>


<input

id="distance"

type="number"

placeholder="Distance"

>




<label>
Shipping Cost (₹)
</label>


<input

id="price"

type="number"

placeholder="Shipping Cost"

>




<button 
class="addBtn"
onclick="addRule()">

Add Shipping Rule

</button>



</div>
<!-- Shipping Rules List -->

<div 
class="table-card" 
id="rulesSection" 
style="display:none;"
>

<h2>
Shipping Rules List
</h2>


<table>

<thead>

<tr>

<th>Location</th>
<th>Weight</th>
<th>Distance</th>
<th>Cost</th>
<th>Action</th>

</tr>

</thead>


<tbody id="rules">

</tbody>


</table>


</div>


</div>






<!-- Error Popup -->


<div id="errorPopup" class="popup">

<div class="popup-box">


<h3 style="color:red;">
Error
</h3>


<p id="errorMessage"></p>


<button 
class="okBtn"
onclick="closeError()">

OK

</button>


</div>

</div>







<!-- Delete Popup -->


<div id="deletePopup" class="popup">

<div class="popup-box">


<h3 style="color:red;">
Delete Confirmation
</h3>


<p>
Are you sure you want to delete this rule?
</p>


<button 
class="deleteConfirm"
onclick="confirmDelete()">

Delete

</button>



<button 
class="cancelBtn"
onclick="closeDelete()">

Cancel

</button>



</div>

</div>







<script>


let rules =
JSON.parse(localStorage.getItem("shippingRules_v2")) || [];


let deleteIndex = null;



displayRules();

updateCount();







// Error Popup


function showError(message){


document.getElementById("errorMessage").innerHTML = message;


document.getElementById("errorPopup").style.display="flex";


}




function closeError(){


document.getElementById("errorPopup").style.display="none";


}









// Add Rule


function addRule(){



let location =
document.getElementById("location").value.trim();


let minWeight =
document.getElementById("minWeight").value;


let maxWeight =
document.getElementById("maxWeight").value;


let distance =
document.getElementById("distance").value;


let price =
document.getElementById("price").value;






if(

location=="" ||

minWeight=="" ||

maxWeight=="" ||

distance=="" ||

price==""

){


showError("Please fill all fields.");

return;

}







if(Number(minWeight)>=Number(maxWeight)){


showError(
"Maximum weight must be greater than minimum weight."
);

return;

}







if(Number(distance)<1 || Number(distance)>1000){


showError(
"Distance must be between 1 and 1000 KM."
);


return;

}







if(Number(price)<=0){


showError(
"Shipping Cost must be greater than 0."
);


return;

}







// Duplicate Check

let exists = rules.some(rule=>{


return (

rule.location.toLowerCase()
===
location.toLowerCase()


&&


Number(rule.minWeight)
===
Number(minWeight)


&&


Number(rule.maxWeight)
===
Number(maxWeight)


&&


Number(rule.distance)
===
Number(distance)


);


});






if(exists){


showError(
"Shipping Rule already exists for this Location, Weight and Distance."
);


return;


}







// Save


rules.push({

location,

minWeight,

maxWeight,

distance,

price

});






localStorage.setItem(

"shippingRules_v2",

JSON.stringify(rules)

);






displayRules();

updateCount();







// Show table after adding

document.getElementById("rulesSection")
.style.display="block";







// CLEAR INPUT AFTER SUCCESS ADD


setTimeout(()=>{

document.getElementById("location").value="";

document.getElementById("minWeight").value="";

document.getElementById("maxWeight").value="";

document.getElementById("distance").value="";

document.getElementById("price").value="";

},3000);


}









// Display Rules


function displayRules(){


let tbody =
document.getElementById("rules");


tbody.innerHTML="";





rules.forEach((rule,index)=>{


tbody.innerHTML += `


<tr>


<td>${rule.location}</td>


<td>
${rule.minWeight} - ${rule.maxWeight} KG
</td>


<td>
${rule.distance} KM
</td>


<td>
₹${rule.price}
</td>


<td>


<button

class="deleteBtn"

onclick="deleteRule(${index})">

Delete

</button>


</td>


</tr>


`;



});






if(rules.length>0){


document.getElementById("rulesSection")
.style.display="block";


}

else{


document.getElementById("rulesSection")
.style.display="none";


}


}









// Count


function updateCount(){


document.getElementById("totalRules")
.innerHTML = rules.length;


}








// Delete


function deleteRule(index){


deleteIndex=index;


document.getElementById("deletePopup")
.style.display="flex";


}






function confirmDelete(){


rules.splice(deleteIndex,1);



localStorage.setItem(

"shippingRules_v2",

JSON.stringify(rules)

);



displayRules();

updateCount();



closeDelete();


}






function closeDelete(){


document.getElementById("deletePopup")
.style.display="none";


}



</script>


</body>

</html>
