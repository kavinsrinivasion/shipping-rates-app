<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Custom Shipping Rates Manager</title>


<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:30px;
}


.container{

max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;

}


input,button{

width:100%;
padding:12px;
margin:8px 0;
box-sizing:border-box;

}


button{

background:#000;
color:white;
border:none;
cursor:pointer;
border-radius:6px;

}


button:hover{

opacity:.85;

}


.locked{

background:#eeeeee;

}



#counter{

background:#eee;
padding:10px;
border-radius:8px;

}



/* TABLE */

table{

width:100%;
border-collapse:collapse;
margin-top:20px;

}


th{

background:#222;
color:white;

}


th,td{

border:1px solid #ddd;
padding:12px;
text-align:center;

}


tr:nth-child(even){

background:#f8f8f8;

}


tr:hover{

background:#eeeeee;

}



.edit{

background:#1976d2;

}



.delete{

background:#d32f2f;

}




#msg{

display:none;
background:#d4edda;
color:#155724;
padding:10px;
border-radius:5px;

}



/* POPUP */


.popup,
.error-popup{

display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;

}



.popup-box,
.error-box{

background:white;
padding:25px;
width:350px;
border-radius:10px;
text-align:center;

}



.error-box{

color:red;

}



</style>


</head>


<body>



<div class="container">



<h2>
Custom Shipping Rates Manager
</h2>


<h3 id="counter">
Total Rules: 0
</h3>



<input id="location"
placeholder="Customer Location"
oninput="lockInputs()">



<input id="minWeight"
type="number"
placeholder="Minimum Weight (kg)"
oninput="lockInputs()">



<input id="maxWeight"
type="number"
placeholder="Maximum Weight (kg)"
oninput="lockInputs()">



<input id="distance"
type="number"
placeholder="Distance (km)"
oninput="lockInputs()">



<input id="price"
type="number"
placeholder="Shipping Cost"
oninput="lockInputs()">



<button onclick="addRule()">
Add Shipping Rule
</button>



<div id="msg">
✅ Rule Added Successfully
</div>



<hr>



<input id="search"
placeholder="Search Location"
onkeyup="searchRule()">



<table>


<thead>

<tr>

<th>Location</th>
<th>Weight</th>
<th>Distance</th>
<th>Cost</th>
<th>Action</th>

</tr>


</thead>


<tbody id="rules">

</tbody>


</table>



</div>







<!-- EDIT POPUP -->


<div id="editPopup" class="popup">


<div class="popup-box">


<h3>Edit Rule</h3>


<input id="editLocation">


<input id="editMinWeight"
type="number">


<input id="editMaxWeight"
type="number">


<input id="editDistance"
type="number">


<input id="editPrice"
type="number">



<button onclick="saveEdit()">
Save Changes
</button>


<button onclick="closeEdit()">
Cancel
</button>



</div>


</div>







<!-- ERROR POPUP -->


<div id="errorPopup" class="error-popup">


<div class="error-box">


<h3>Error</h3>


<p id="errorText"></p>


<button onclick="closeError()">
OK
</button>



</div>


</div>









<script>


let rules =
JSON.parse(localStorage.getItem("shippingRules")) || [];


let isLocked=false;

let editIndex=-1;

let currentData=rules;






function lockInputs(){


if(isLocked)
return;



let inputs=document.querySelectorAll(
".container input:not(#search)"
);



let filled=false;


inputs.forEach(input=>{

if(input.value!="")
filled=true;

});



if(filled){


isLocked=true;


inputs.forEach(input=>{

input.readOnly=true;

input.classList.add("locked");

});


}


}







function addRule(){


let location=
document.getElementById("location").value.trim();


let minWeight=
document.getElementById("minWeight").value;


let maxWeight=
document.getElementById("maxWeight").value;


let distance=
document.getElementById("distance").value;


let price=
document.getElementById("price").value;





if(!location||
!minWeight||
!maxWeight||
!distance||
!price){


showError(
"Please fill all fields"
);

return;

}





let duplicate =
rules.some(r=>

r.location.toLowerCase()
==
location.toLowerCase()

&&

r.minWeight==minWeight

&&

r.maxWeight==maxWeight

&&

r.distance==distance

);



if(duplicate){

showError(
"Same Rule Already Exists"
);

return;

}





rules.push({

location,
minWeight,
maxWeight,
distance,
price

});



saveData();

clearInputs();

displayRules();

showMessage();


}








function editRule(i){



let r=rules[i];

editIndex=i;



editLocation.value=r.location;

editMinWeight.value=r.minWeight;

editMaxWeight.value=r.maxWeight;

editDistance.value=r.distance;

editPrice.value=r.price;



editPopup.style.display="flex";


}







function saveEdit(){



let location=editLocation.value;

let minWeight=editMinWeight.value;

let maxWeight=editMaxWeight.value;

let distance=editDistance.value;

let price=editPrice.value;




let duplicate =
rules.some((r,i)=>

i!=editIndex &&

r.location.toLowerCase()
==
location.toLowerCase()

&&

r.minWeight==minWeight

&&

r.maxWeight==maxWeight

&&

r.distance==distance

);



if(duplicate){

showError(
"Same Min Weight, Max Weight and Distance Exists"
);

return;

}





rules[editIndex]={

location,
minWeight,
maxWeight,
distance,
price

};



saveData();

closeEdit();

displayRules();


}








function deleteRule(i){


if(confirm(
"Are you sure delete?"
)){


rules.splice(i,1);


saveData();

displayRules();


}


}







function searchRule(){


let value=
search.value.toLowerCase();



currentData =
rules.filter(r=>

r.location.toLowerCase()
.includes(value)

);



displayTable(currentData);


}







function displayRules(){

currentData=rules;

displayTable(rules);

}







function displayTable(data){



let out="";



data.forEach((r,i)=>{


out+=`

<tr>

<td>${r.location}</td>

<td>
${r.minWeight}-${r.maxWeight} kg
</td>

<td>
${r.distance} km
</td>

<td>
₹${r.price}
</td>


<td>


<button class="edit"
onclick="editRule(${i})">
Edit
</button>



<button class="delete"
onclick="deleteRule(${i})">
Delete
</button>


</td>


</tr>

`;



});



rules.innerHTML=out;



counter.innerHTML=
"Total Rules: "+rules.length;



}







function saveData(){


localStorage.setItem(
"shippingRules",
JSON.stringify(rules)
);


}







function clearInputs(){


document.querySelectorAll(
".container input:not(#search)"
)
.forEach(input=>{


input.value="";

input.readOnly=false;

input.classList.remove("locked");


});


isLocked=false;


}






function closeEdit(){

editPopup.style.display="none";

}




function showError(msg){

errorText.innerHTML=msg;

errorPopup.style.display="flex";

}



function closeError(){

errorPopup.style.display="none";

}



function showMessage(){

msg.style.display="block";


setTimeout(()=>{

msg.style.display="none";

},2000);


}




displayRules();



</script>


</body>

</html>
