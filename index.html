<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Custom Shipping Rates Dashboard</title>

<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

background:#f1f5f9;
padding:30px;

}



.dashboard{

max-width:1100px;
margin:auto;

}



/* Header */

.header{

background:#2563eb;
color:white;
padding:25px;
border-radius:15px;
margin-bottom:25px;

}


.header h1{

margin-bottom:8px;

}



/* Card */

.card{

background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
margin-bottom:25px;

}



.counter{

display:flex;
justify-content:space-between;
align-items:center;

}


.counter h2{

font-size:36px;
color:#2563eb;

}



/* Form */


.form-card{

background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);

}



label{

display:block;
font-weight:bold;
margin-top:15px;

}



input{

width:100%;
padding:12px;
margin-top:5px;
border:1px solid #ddd;
border-radius:8px;
font-size:15px;

}




.addBtn{

width:100%;
background:#2563eb;
color:white;
border:none;
padding:14px;
border-radius:8px;
margin-top:20px;
cursor:pointer;
font-size:16px;

}


.addBtn:hover{

background:#1d4ed8;

}



/* Table */


.table-card{

background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
margin-top:25px;

}



table{

width:100%;
border-collapse:collapse;

}


th{

background:#2563eb;
color:white;
padding:12px;

}


td{

padding:12px;
border-bottom:1px solid #ddd;
text-align:center;

}



.deleteBtn{

background:#dc3545;
color:white;
border:none;
padding:8px 15px;
border-radius:6px;
cursor:pointer;

}




/* Popup */


.popup{

display:none;
position:fixed;
top:0;
left:0;
height:100%;
width:100%;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;

}



.popup-box{

background:white;
width:350px;
padding:25px;
border-radius:15px;
text-align:center;

}



.popup-box h3{

margin-bottom:15px;

}



.popup-box button{

padding:10px 20px;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
margin:10px;

}



.deleteConfirm{

background:#dc3545;

}



.cancelBtn{

background:#6c757d;

}



.okBtn{

background:#2563eb;

}



</style>

</head>


<body>


<div class="dashboard">



<div class="header">

<h1>
🚚 Custom Shipping Rates Dashboard
</h1>

<p>
Manage your shipping rules easily
</p>

</div>





<div class="card counter">


<h3>
Total Shipping Rules
</h3>


<h2 id="totalRules">
0
</h2>


</div>





<div class="form-card">


<h2>
Add Shipping Rule
</h2>




<label>
Customer Location
</label>


<input
id="location"
type="text"
maxlength="30"
placeholder="Enter Location"
oninput="this.value=this.value.replace(/[^A-Za-z\s]/g,'')">





<label>
Minimum Weight (KG)
</label>


<input
id="minWeight"
type="number"
placeholder="Minimum Weight">





<label>
Maximum Weight (KG)
</label>


<input
id="maxWeight"
type="number"
placeholder="Maximum Weight">





<label>
Distance (KM)
</label>


<input
id="distance"
type="number"
placeholder="Distance">





<label>
Shipping Cost (₹)
</label>


<input
id="price"
type="number"
placeholder="Shipping Cost">





<button class="addBtn" onclick="addRule()">

+ Add Shipping Rule

</button>


</div>
<!-- Shipping Rules List -->

<div class="table-card" id="rulesSection" style="display:none;">


<h2>
Shipping Rules List
</h2>


<table>


<thead>

<tr>

<th>Location</th>
<th>Weight</th>
<th>Distance</th>
<th>Cost</th>
<th>Action</th>

</tr>

</thead>


<tbody id="rules">

</tbody>


</table>


</div>




</div>





<!-- Delete Confirm Popup -->

<div id="deletePopup" class="popup">


<div class="popup-box">


<h3 style="color:red;">
Confirm Delete
</h3>


<p>
Are you sure you want to delete this Shipping Rule?
</p>


<button class="deleteConfirm" onclick="confirmDelete()">

Delete

</button>


<button class="cancelBtn" onclick="closeDelete()">

Cancel

</button>


</div>


</div>




<!-- Error Popup -->

<div id="errorPopup" class="popup">


<div class="popup-box">


<h3 style="color:red;">
Error
</h3>


<p id="errorMessage"></p>


<button class="okBtn" onclick="closeError()">

OK

</button>


</div>


</div>





<script>


let rules = JSON.parse(localStorage.getItem("shippingRules")) || [];


let deleteIndex = null;



displayRules();

updateCounter();





// ======================
// Error Popup
// ======================


function showError(message){


document.getElementById("errorMessage").innerHTML = message;


document.getElementById("errorPopup").style.display="flex";


}



function closeError(){


document.getElementById("errorPopup").style.display="none";


}






// ======================
// Add Rule
// ======================


function addRule(){


let location =
document.getElementById("location").value.trim();


let minWeight =
document.getElementById("minWeight").value;


let maxWeight =
document.getElementById("maxWeight").value;


let distance =
document.getElementById("distance").value;


let price =
document.getElementById("price").value;





if(
location=="" ||
minWeight=="" ||
maxWeight=="" ||
distance=="" ||
price==""

){

showError("Please fill all fields.");

return;

}





if(Number(minWeight)>=Number(maxWeight)){


showError(
"Maximum weight must be greater than minimum weight."
);


return;

}





if(Number(distance)<1 || Number(distance)>1000){


showError(
"Distance must be between 1 and 1000 KM."
);


return;

}





if(Number(price)<=0){


showError(
"Shipping cost must be greater than 0."
);


return;

}






let duplicate = rules.some(rule =>


rule.location.toLowerCase()==location.toLowerCase()

&&
rule.minWeight==minWeight

&&
rule.maxWeight==maxWeight

&&
rule.distance==distance

&&
rule.price==price


);





if(duplicate){


showError("Shipping Rule already exists.");

return;

}






rules.push({

location,
minWeight,
maxWeight,
distance,
price

});





localStorage.setItem(

"shippingRules",

JSON.stringify(rules)

);





displayRules();

updateCounter();



// Show list only after adding rule

document.getElementById("rulesSection").style.display="block";



document.getElementById("rulesSection")
.scrollIntoView({

behavior:"smooth"

});



}







// ======================
// Display Rules
// ======================


function displayRules(){



let tbody=document.getElementById("rules");


tbody.innerHTML="";




rules.forEach((rule,index)=>{


tbody.innerHTML += `


<tr>


<td>${rule.location}</td>


<td>

${rule.minWeight} - ${rule.maxWeight} KG

</td>


<td>

${rule.distance} KM

</td>


<td>

₹${rule.price}

</td>


<td>


<button class="deleteBtn"

onclick="deleteRule(${index})">

Delete

</button>


</td>


</tr>


`;



});





if(rules.length > 0){

document.getElementById("rulesSection").style.display="block";

}


}







// ======================
// Counter
// ======================


function updateCounter(){


document.getElementById("totalRules").innerHTML = rules.length;


}







// ======================
// Delete
// ======================


function deleteRule(index){


deleteIndex=index;


document.getElementById("deletePopup").style.display="flex";


}




function confirmDelete(){


rules.splice(deleteIndex,1);



localStorage.setItem(

"shippingRules",

JSON.stringify(rules)

);





displayRules();

updateCounter();


closeDelete();




// Hide list if no rules

if(rules.length==0){


document.getElementById("rulesSection").style.display="none";


}



}







function closeDelete(){


document.getElementById("deletePopup").style.display="none";


}



</script>



</body>

</html>
