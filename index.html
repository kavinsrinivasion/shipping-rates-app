<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Custom Shipping Rates Manager</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#f4f6f9;
padding:40px;

}

.container{

max-width:900px;
margin:auto;
background:#fff;
padding:30px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,.1);

}

h2{

text-align:center;
margin-bottom:25px;

}

label{

font-weight:bold;

}

input{

width:100%;
padding:12px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:15px;

}

button{

padding:12px;
background:#0078ff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;

}

button:hover{

background:#005fd1;

}

.success{

display:none;
background:#d4edda;
color:#155724;
padding:12px;
margin-top:15px;
border-radius:6px;

}

table{

width:100%;
margin-top:25px;
border-collapse:collapse;

}

table th{

background:#0078ff;
color:white;
padding:12px;

}

table td{

padding:10px;
border:1px solid #ddd;
text-align:center;

}

.delete{

background:red;
color:white;
padding:8px 12px;
border:none;
border-radius:5px;
cursor:pointer;

}

.delete:hover{

background:darkred;

}

</style>

</head>

<body>

<div class="container">

<h2>Custom Shipping Rates Manager</h2>

<div id="success" class="success">

Rule Added Successfully

</div>

<label>Customer Location</label>

<input
type="text"
id="location"
placeholder="Enter Customer Location"
maxlength="30">

<label>Minimum Weight (kg)</label>

<input
type="number"
id="minWeight"
placeholder="Minimum Weight">

<label>Maximum Weight (kg)</label>

<input
type="number"
id="maxWeight"
placeholder="Maximum Weight">

<label>Distance (km)</label>

<input
type="number"
id="distance"
placeholder="1 - 1000 KM"
min="1"
max="1000">

<label>Shipping Cost (₹)</label>

<input
type="number"
id="price"
placeholder="Shipping Cost">

<button onclick="addRule()">

Add Shipping Rule

</button>

<table>

<thead>

<tr>

<th>Location</th>

<th>Weight</th>

<th>Distance</th>

<th>Cost</th>

<th>Action</th>

</tr>

</thead>

<tbody id="rules">

</tbody>

</table>

</div>

<script>
    let rules = JSON.parse(localStorage.getItem("shippingRules")) || [];

displayRules();

function addRule() {

    let location = document.getElementById("location").value.trim();
    let minWeight = document.getElementById("minWeight").value;
    let maxWeight = document.getElementById("maxWeight").value;
    let distance = document.getElementById("distance").value;
    let price = document.getElementById("price").value;

    // Empty Validation
    if (
        location === "" ||
        minWeight === "" ||
        maxWeight === "" ||
        distance === "" ||
        price === ""
    ) {
        alert("Please fill all fields.");
        return;
    }

    // Maximum Weight Validation
    if (Number(minWeight) >= Number(maxWeight)) {
        alert("Maximum Weight must be greater than Minimum Weight.");
        return;
    }

    // Distance Validation
    if (Number(distance) < 1 || Number(distance) > 1000) {
        alert("Distance must be between 1 and 1000 KM.");
        return;
    }

    // Save Rule
    let rule = {
        location,
        minWeight,
        maxWeight,
        distance,
        price
    };

    rules.push(rule);

    localStorage.setItem(
        "shippingRules",
        JSON.stringify(rules)
    );

    displayRules();

    // Success Message
    let success = document.getElementById("success");

    success.style.display = "block";

    setTimeout(function () {

        success.style.display = "none";

    }, 2000);

    // AUTO CLEAR OFF
    // Inputs clear aagathu.

}

function displayRules() {

    let tbody = document.getElementById("rules");

    tbody.innerHTML = "";

    rules.forEach(function (rule, index) {

        tbody.innerHTML += `

        <tr>

        <td>${rule.location}</td>

        <td>${rule.minWeight} - ${rule.maxWeight} KG</td>

        <td>${rule.distance} KM</td>

        <td>₹${rule.price}</td>

        <td>

        <button
        class="delete"
        onclick="deleteRule(${index})">

        Delete

        </button>

        </td>

        </tr>

        `;

    });

}

function deleteRule(index) {

    let confirmDelete = confirm(
        "Are you sure you want to delete this rule?"
    );

    if (confirmDelete) {

        rules.splice(index, 1);

        localStorage.setItem(
            "shippingRules",
            JSON.stringify(rules)
        );

        displayRules();

    }

}

</script>

</body>

</html>v
