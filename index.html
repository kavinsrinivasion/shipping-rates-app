<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Custom Shipping Rates Manager</title>


<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:30px;
}


.container{

max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;

}


input,button{

width:100%;
padding:12px;
margin:8px 0;
box-sizing:border-box;

}


button{

background:#000;
color:white;
border:none;
cursor:pointer;
border-radius:6px;

}


button:hover{
opacity:.8;
}


#counter{

background:#eee;
padding:10px;
border-radius:8px;

}



table{

width:100%;
border-collapse:collapse;
margin-top:20px;

}


th{

background:#222;
color:white;

}


th,td{

border:1px solid #ddd;
padding:12px;
text-align:center;

}


.edit{

background:#1976d2;

}


.delete{

background:#d32f2f;

}



#msg{

display:none;
background:#d4edda;
color:#155724;
padding:10px;

}




/* POPUPS */


.popup,
.error-popup{

display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;

}



.popup-box,
.error-box{

background:white;
width:350px;
padding:25px;
border-radius:10px;
text-align:center;

}



.error-box{

color:red;

}



</style>


</head>


<body>


<div class="container">


<h2>
Custom Shipping Rates Manager
</h2>


<h3 id="counter">
Total Rules: 0
</h3>



<input id="location"
placeholder="Customer Location">



<input id="minWeight"
type="number"
placeholder="Minimum Weight (kg)">



<input id="maxWeight"
type="number"
placeholder="Maximum Weight (kg)">



<input id="distance"
type="number"
placeholder="Distance (km)">



<input id="price"
type="number"
placeholder="Shipping Cost">



<button onclick="addRule()">

Add Shipping Rule

</button>




<div id="msg">

✅ Rule Added Successfully

</div>



<hr>



<input id="search"
placeholder="Search Location"
onkeyup="searchRule()">





<table>


<thead>

<tr>

<th>Location</th>

<th>Weight</th>

<th>Distance</th>

<th>Cost</th>

<th>Action</th>


</tr>


</thead>



<tbody id="ruleTable">

</tbody>


</table>



</div>







<!-- EDIT POPUP -->


<div id="editPopup" class="popup">


<div class="popup-box">


<h3>Edit Shipping Rule</h3>


<input id="editLocation">


<input id="editMinWeight"
type="number">


<input id="editMaxWeight"
type="number">


<input id="editDistance"
type="number">


<input id="editPrice"
type="number">


<button onclick="saveEdit()">

Save Changes

</button>



<button onclick="closeEdit()">

Cancel

</button>


</div>


</div>







<!-- ERROR POPUP -->


<div id="errorPopup" class="error-popup">


<div class="error-box">


<h3>Error</h3>


<p id="errorText"></p>


<button onclick="closeError()">

OK

</button>


</div>


</div>







<script>


let shippingRules =
JSON.parse(localStorage.getItem("shippingRules")) || [];


let editIndex=-1;






function validateData(location,minWeight,maxWeight,distance,price){



if(location.length < 3){

return "Location minimum 3 characters required";

}



if(location.length > 50){

return "Location maximum 50 characters only";

}




let pattern=/^[A-Za-z ]+$/;


if(!pattern.test(location)){

return "Location should contain only characters";

}





if(Number(minWeight)>=Number(maxWeight)){


return "Minimum weight must be less than Maximum weight";

}





if(Number(distance)<1 || Number(distance)>500){


return "Distance must be between 1 and 500 km";

}





if(Number(price)<=0){


return "Shipping cost must be greater than zero";

}



return "";

}







function addRule(){



let location =
document.getElementById("location").value.trim();



let minWeight =
document.getElementById("minWeight").value;



let maxWeight =
document.getElementById("maxWeight").value;



let distance =
document.getElementById("distance").value;



let price =
document.getElementById("price").value;






if(!location || !minWeight || !maxWeight || !distance || !price){


showError("Please fill all fields");

return;

}






let error =
validateData(
location,
minWeight,
maxWeight,
distance,
price
);




if(error!=""){

showError(error);

return;

}







let duplicate =
shippingRules.some(rule=>


rule.location.toLowerCase()==location.toLowerCase()

&&

rule.minWeight==minWeight

&&

rule.maxWeight==maxWeight

&&

rule.distance==distance


);





if(duplicate){


showError("Same Rule Already Exists");


return;


}







shippingRules.push({

location,
minWeight,
maxWeight,
distance,
price

});





saveData();


clearInputs();


displayRules();


showMessage();



}








function editRule(index){



let rule=shippingRules[index];


editIndex=index;



editLocation.value=rule.location;

editMinWeight.value=rule.minWeight;

editMaxWeight.value=rule.maxWeight;

editDistance.value=rule.distance;

editPrice.value=rule.price;



editPopup.style.display="flex";



}








function saveEdit(){



let location=editLocation.value.trim();

let minWeight=editMinWeight.value;

let maxWeight=editMaxWeight.value;

let distance=editDistance.value;

let price=editPrice.value;






let error =
validateData(
location,
minWeight,
maxWeight,
distance,
price
);



if(error!=""){

showError(error);

return;

}






shippingRules[editIndex]={

location,
minWeight,
maxWeight,
distance,
price

};





saveData();


closeEdit();


displayRules();


}









function deleteRule(index){


if(confirm("Delete this rule?")){


shippingRules.splice(index,1);


saveData();


displayRules();


}


}









function searchRule(){


let value =
document.getElementById("search")
.value.toLowerCase();




let result =
shippingRules.filter(rule=>

rule.location.toLowerCase()
.includes(value)

);



displayTable(result);



}








function displayRules(){

displayTable(shippingRules);

}








function displayTable(data){


let output="";



data.forEach((rule,index)=>{


output+=`

<tr>

<td>${rule.location}</td>

<td>${rule.minWeight}-${rule.maxWeight} kg</td>

<td>${rule.distance} km</td>

<td>₹${rule.price}</td>


<td>


<button class="edit"
onclick="editRule(${index})">

Edit

</button>


<button class="delete"
onclick="deleteRule(${index})">

Delete

</button>


</td>


</tr>


`;



});





document.getElementById("ruleTable")
.innerHTML=output;




document.getElementById("counter")
.innerHTML=
"Total Rules: "+shippingRules.length;



}







function clearInputs(){


location.value="";

minWeight.value="";

maxWeight.value="";

distance.value="";

price.value="";


}








function saveData(){


localStorage.setItem(

"shippingRules",

JSON.stringify(shippingRules)

);


}






function showError(message){


errorText.innerHTML=message;


errorPopup.style.display="flex";


}



function closeError(){


errorPopup.style.display="none";


}





function closeEdit(){


editPopup.style.display="none";


}






function showMessage(){


msg.style.display="block";


setTimeout(()=>{

msg.style.display="none";

},2000);



}





displayRules();


</script>


</body>

</html>
